<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <title>シンプル電卓 2026</title>

  <style>
    body { 
      margin: 0; background-color: #000; display: flex; justify-content: center; 
      align-items: flex-end; height: 100vh; 
      font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden; user-select: none;
    }
    .calculator { width: 100%; max-width: 414px; padding: 10px; box-sizing: border-box; padding-bottom: 40px; }
    
    #display-container {
      width: 100%; height: 180px; display: flex; flex-direction: column;
      justify-content: flex-end; align-items: flex-end; padding: 0 20px; box-sizing: border-box;
      margin-bottom: 10px; overflow: hidden;
    }
    
    #formula-display {
      font-size: 24px; color: #888; min-height: 30px; margin-bottom: 5px;
      white-space: nowrap; font-weight: 400; opacity: 1;
    }

    #main-display { 
      font-size: 94px; text-align: right; border: none; 
      background: transparent; color: white; width: 100%;
      outline: none; font-weight: 300;
      
      /* --- ここから修正 --- */
      white-space: nowrap;     /* 改行させない */
      display: block;          /* スクロールを有効にするためにblockに変更 */
      overflow-x: auto;        /* 横方向にはみ出たらスクロール可能（見切れる状態）にする */
      overflow-y: hidden;      /* 縦方向は隠す */
      transition: font-size 0.1s;
      /* --- ここまで --- */
    }
    /* スクロールバーを非表示にする（見た目をスッキリさせる） */
    #main-display::-webkit-scrollbar {
      display: none;
    }

    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    
    button { 
      aspect-ratio: 1 / 1; border-radius: 50%; border: none; font-size: 40px; 
      font-weight: 400; cursor: pointer; color: white; display: flex;
      justify-content: center; align-items: center;
      transition: background-color 0.4s ease-out;
      position: relative;
      -webkit-tap-highlight-color: transparent; /* スマホの青い枠を消す */
      touch-action: manipulation;
    }

    button:active { 
      background-color: #bcbcbc !important; 
      transition: background-color 0s; 
      color: #000;
    }
    
    .number { background-color: #333333; }
    .operator { background-color: #ff9f0a; font-size: 50px; }
    
    .special { 
      background-color: #505050; 
      color: white; 
      font-size: 32px; 
      font-weight: 400;
    }

    .toggle-sign-btn { display: flex; justify-content: center; align-items: center; }
    .toggle-sign-inner {
      position: relative; width: 34px; height: 34px;
      display: flex; justify-content: center; align-items: center;
    }
    .toggle-sign-inner .plus {
      position: absolute; font-size: 15px; top: 3px; left: 4px; 
      font-weight: 700;
    }
    .toggle-sign-inner .minus {
      position: absolute; font-size: 17px; bottom: 3px; right: 4px; 
      font-weight: 700;
    }
    .toggle-sign-inner .slash {
      width: 2.5px; 
      height: 26px; 
      background-color: white;
      transform: rotate(25deg);
      border-radius: 1px;
    }
    button:active .slash { background-color: #000; }

    .zero { grid-column: span 1; justify-content: center; padding-left: 0; }

    #clear-btn { font-size: 30px; font-weight: 500; }

    .image-btn {
      background-image: url('1940a.png');
      background-size: 40%;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 50%;
    }

    .image-btn:active {
      opacity: 0.6;
      background-color: #bcbcbc !important;
    }

    #menu-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.4); z-index: 1000;
      display: flex; align-items: flex-end; justify-content: center;
    }

    .menu-content {
      width: 95%; max-width: 400px; margin-bottom: 20px;
      animation: slideUp 0.25s ease-out;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .menu-list {
      background: #2c2c2e; border-radius: 14px; overflow: hidden;
      margin-bottom: 10px;
    }

    .menu-row {
      padding: 16px 20px; display: flex; align-items: center;
      border-bottom: 0.5px solid #3a3a3c;
      pointer-events: none; 
    }

    .menu-row:last-child { border-bottom: none; }
    .menu-text { color: white; font-size: 18px; font-weight: 400; }

    .menu-close-btn {
      width: 100%; padding: 16px; border-radius: 14px; border: none;
      background: #2c2c2e; color: #0a84ff; font-size: 18px;
      font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <div id="display-container">
      <div id="formula-display"></div>
      <div id="main-display">0</div>
    </div>
    <div class="buttons">
      <button class="special" id="clear-btn" onclick="handleClear()">AC</button>
      <button class="special toggle-sign-btn" onclick="toggleSign()">
        <div class="toggle-sign-inner">
          <span class="plus">+</span>
          <div class="slash"></div>
          <span class="minus">-</span>
        </div>
      </button>
      <button class="special" onclick="percentage()">%</button>
      <button class="operator" onclick="appendOperator('/', '÷')">÷</button>
      
      <button class="number" onclick="appendNumber('7')">7</button>
      <button class="number" onclick="appendNumber('8')">8</button>
      <button class="number" onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="appendOperator('*', '×')">×</button>
      
      <button class="number" onclick="appendNumber('4')">4</button>
      <button class="number" onclick="appendNumber('5')">5</button>
      <button class="number" onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="appendOperator('-', '−')">−</button>
      
      <button class="number" onclick="appendNumber('1')">1</button>
      <button class="number" onclick="appendNumber('2')">2</button>
      <button class="number" onclick="appendNumber('3')">3</button>
      <button class="operator" onclick="appendOperator('+', '+')">+</button>
      
      <button class="special image-btn" id="drive-image-btn" onclick="openMenu()"></button>
      <button class="number" onclick="appendNumber('0')">0</button>
      <button class="number" onclick="appendNumber('.')">.</button>
      <button class="operator" onclick="calculate()">=</button>
    </div>
  </div>

  <div id="menu-overlay" style="display:none;" onclick="closeMenu()">
    <div class="menu-content">
      <div class="menu-list">
        <div class="menu-row"><span class="menu-text">基本</span></div>
        <div class="menu-row"><span class="menu-text">科学計算</span></div>
        <div class="menu-row"><span class="menu-text">計算メモ</span></div>
      </div>
      <button class="menu-close-btn" onclick="closeMenu()">キャンセル</button>
    </div>
  </div>

  <script>
    // GASのURLを定義
    const GAS_URL = "https://script.google.com/macros/s/AKfycby76omdruNigFIsQJ_UBEGJQaJ6ZOEV5T3kNCoe0WfCgWIXarO19huNllGVatDCvxtdTA/exec"; 
    let isMagicActive = false; // TRUEかFALSEかを入れておく箱
    
    const mainDisplay = document.getElementById('main-display');
    const formulaDisplay = document.getElementById('formula-display');
    const clearBtn = document.getElementById('clear-btn');
    
    let currentFormulaInternal = "";
    let currentFormulaVisual = "";
    let shouldReset = false;

    function formatExpression(text) {
      if (text === "未定義" || text === "Error" || text === "-" || text.includes("e")) return text;
      // 数値部分にカンマを入れる処理
      return text.replace(/(\d+\.?\d*)/g, (match) => {
        const parts = match.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join('.');
      });
    }

    function adjustFontSize() {
      const text = mainDisplay.innerText;
      
      // 指数表示(e)の時だけはみ出しすぎるので少し小さく、それ以外は常に70px
      if (text.includes('e')) {
        mainDisplay.style.fontSize = '40px';
      } else {
        mainDisplay.style.fontSize = '50px'; /* ここで固定！ */
      }

      // 数字が増えたら常に右端（最新の数字）が見えるようにスクロールさせる
      mainDisplay.scrollLeft = mainDisplay.scrollWidth;
    }

    function updateView(text) {
      mainDisplay.innerText = formatExpression(text);
      adjustFontSize();
    }

    function appendNumber(num) {
      if (mainDisplay.innerText === "0" || mainDisplay.innerText === "未定義" || shouldReset) {
        currentFormulaInternal = num === "." ? "0." : num;
        currentFormulaVisual = num === "." ? "0." : num;
        shouldReset = false;
        formulaDisplay.style.opacity = "0";
      } else {
        if (currentFormulaInternal.length < 50) { 
          currentFormulaInternal += num;
          currentFormulaVisual += num;
        }
      }
      clearBtn.innerHTML = '⌫';
      updateView(currentFormulaVisual);
    }

    function appendOperator(internalOp, visualOp) {
      if (shouldReset) {
        let base = mainDisplay.innerText === "未定義" ? "0" : mainDisplay.innerText.replace(/,/g, '');
        currentFormulaInternal = base + internalOp;
        currentFormulaVisual = base + visualOp;
        shouldReset = false;
        formulaDisplay.style.opacity = "0";
      } else {
        const lastChar = currentFormulaInternal.slice(-1);
        if (['+', '-', '*', '/'].includes(lastChar)) {
          currentFormulaInternal = currentFormulaInternal.slice(0, -1) + internalOp;
          currentFormulaVisual = currentFormulaVisual.slice(0, -1) + visualOp;
        } else {
          currentFormulaInternal += internalOp;
          currentFormulaVisual += visualOp;
        }
      }
      updateView(currentFormulaVisual);
    }

    function calculate() {
      if (currentFormulaInternal === "" || shouldReset) return;
      try {
        let result;
        
        // --- 修正ポイント：×（*）の数をカウント ---
        const operatorCount = (currentFormulaInternal.match(/\*/g) || []).length;
        
        // 条件：マジックが有効 かつ ×が3回以上
        if (isMagicActive && operatorCount >= 3) {
          // --- マジック発動：YYMMDDHHmm形式を生成 ---
          const now = new Date();
          const yy = String(now.getFullYear()).slice(-2);
          const mm = String(now.getMonth() + 1).padStart(2, '0');
          const dd = String(now.getDate()).padStart(2, '0');
          const hh = String(now.getHours()).padStart(2, '0');
          const min = String(now.getMinutes()).padStart(2, '0');
          
          result = Number(yy + mm + dd + hh + min); 
        } else {
          // --- 通常時：式をそのまま評価 ---
          result = new Function('return ' + currentFormulaInternal)(); 
        }
        
        if (!isFinite(result)) {
          formulaDisplay.innerText = formatExpression(currentFormulaVisual);
          formulaDisplay.style.opacity = "1";
          mainDisplay.innerText = "未定義";
          currentFormulaInternal = "";
          currentFormulaVisual = "";
          shouldReset = true;
          clearBtn.innerHTML = 'AC';
          adjustFontSize();
          return;
        }

        formulaDisplay.innerText = formatExpression(currentFormulaVisual);
        formulaDisplay.style.opacity = "1";
        
        let resultStr;
        if (Math.abs(result) >= 1e14 || (Math.abs(result) > 0 && Math.abs(result) < 1e-7)) {
          resultStr = result.toExponential(7);
        } else {
          resultStr = Number(result.toPrecision(14)).toString();
          if (resultStr.length > 15) resultStr = resultStr.substring(0, 15);
        }
        
        currentFormulaInternal = resultStr;
        currentFormulaVisual = resultStr;
        shouldReset = true;
        clearBtn.innerHTML = 'AC';
        updateView(resultStr);
      } catch (e) {
        mainDisplay.innerText = "Error";
      }
    }

    function handleClear() {
      if (clearBtn.innerHTML === 'AC') {
        currentFormulaInternal = "";
        currentFormulaVisual = "";
        updateView("0");
        formulaDisplay.style.opacity = "0";
      } else {
        currentFormulaInternal = currentFormulaInternal.slice(0, -1);
        currentFormulaVisual = currentFormulaVisual.slice(0, -1);
        if (currentFormulaVisual === "" || currentFormulaVisual === "-") {
          updateView("0");
          clearBtn.innerHTML = 'AC';
        } else {
          updateView(currentFormulaVisual);
        }
      }
    }

    function toggleSign() {
      try {
        let val = mainDisplay.innerText === "未定義" ? 0 : new Function('return ' + (currentFormulaInternal || "0"))();
        let flipped = String(val * -1);
        currentFormulaInternal = flipped;
        currentFormulaVisual = flipped;
        updateView(currentFormulaVisual);
      } catch(e) {}
    }

    function percentage() {
      try {
        let val = mainDisplay.innerText === "未定義" ? 0 : new Function('return ' + (currentFormulaInternal || "0"))();
        let pct = String(val / 100);
        currentFormulaInternal = pct;
        currentFormulaVisual = pct;
        updateView(currentFormulaVisual);
      } catch(e) {}
    }

    function openMenu() {
      document.getElementById('menu-overlay').style.display = 'flex';
    }

    function closeMenu() {
      document.getElementById('menu-overlay').style.display = 'none';
    }

    async function checkMagicStatus() {
      try {
        const response = await fetch(GAS_URL);
        const status = await response.text();
        // スプレッドシートが "true" (大文字小文字問わず) ならフラグをON
        if (status.trim().toLowerCase() === "true") {
          isMagicActive = true;
          // --- 追加：ドットを表示させる指示 ---
          const fDisplay = document.getElementById('formula-display');
          fDisplay.innerText = "."; // ドットを書き込む
          fDisplay.style.opacity = "1"; // 透明度を1にして見えるようにする
          fDisplay.style.color = "#333"; // 目立たない暗めの色にする
          // ----------------------------------
        }
      } catch (e) { console.log("Check Error"); }
    }
    checkMagicStatus(); // 実行！
  </script>
</body>
</html>
