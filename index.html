<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>シンプル電卓 2026</title>
  <style>
    /* 既存のスタイルを維持しつつ、目印用の微調整を追加 */
    body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: flex-end; height: 100vh; font-family: "SF Pro Display", sans-serif; overflow: hidden; user-select: none; }
    .calculator { width: 100%; max-width: 414px; padding: 10px; box-sizing: border-box; padding-bottom: 40px; }
    #display-container { width: 100%; height: 180px; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 0 20px; box-sizing: border-box; margin-bottom: 10px; overflow: hidden; }
    
    /* マジック用の目印：formula-displayにドットを表示 */
    #formula-display { font-size: 20px; color: #333; min-height: 30px; margin-bottom: 5px; white-space: nowrap; font-weight: 400; opacity: 1; }

    #main-display { font-size: 70px; text-align: right; border: none; background: transparent; color: white; width: 100%; outline: none; font-weight: 300; white-space: nowrap; display: block; overflow-x: auto; overflow-y: hidden; }
    #main-display::-webkit-scrollbar { display: none; }

    .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    button { aspect-ratio: 1 / 1; border-radius: 50%; border: none; font-size: 40px; font-weight: 400; cursor: pointer; color: white; display: flex; justify-content: center; align-items: center; transition: background-color 0.4s ease-out; position: relative; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
    button:active { background-color: #bcbcbc !important; transition: background-color 0s; color: #000; }
    .number { background-color: #333333; }
    .operator { background-color: #ff9f0a; font-size: 50px; }
    .special { background-color: #505050; color: white; font-size: 32px; }

    /* 右上の画像ボタン（マジック用の目印をここにも仕込む） */
    .image-btn {
      background-image: url('1940a.png');
      background-size: 40%;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 50%;
      opacity: 1; /* デフォルト */
    }
    /* trueのときだけ適用されるクラス */
    .magic-ready { opacity: 0.8 !important; } 

    /* メニューなどは省略せずに維持 */
    #menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; display: none; align-items: flex-end; justify-content: center; }
    .menu-content { width: 95%; max-width: 400px; margin-bottom: 20px; }
    .menu-list { background: #2c2c2e; border-radius: 14px; overflow: hidden; margin-bottom: 10px; }
    .menu-row { padding: 16px 20px; display: flex; align-items: center; border-bottom: 0.5px solid #3a3a3c; }
    .menu-text { color: white; font-size: 18px; }
  </style>
</head>
<body>
  <div class="calculator">
    <div id="display-container">
      <div id="formula-display"></div> <div id="main-display">0</div>
    </div>
    <div class="buttons">
      <button class="special" id="clear-btn" onclick="handleClear()">AC</button>
      <button class="special" onclick="toggleSign()">⁺∕₋</button>
      <button class="special" onclick="percentage()">%</button>
      <button class="operator" onclick="appendOperator('/', '÷')">÷</button>
      <button class="number" onclick="appendNumber('7')">7</button>
      <button class="number" onclick="appendNumber('8')">8</button>
      <button class="number" onclick="appendNumber('9')">9</button>
      <button class="operator" onclick="appendOperator('*', '×')">×</button>
      <button class="number" onclick="appendNumber('4')">4</button>
      <button class="number" onclick="appendNumber('5')">5</button>
      <button class="number" onclick="appendNumber('6')">6</button>
      <button class="operator" onclick="appendOperator('-', '−')">−</button>
      <button class="number" onclick="appendNumber('1')">1</button>
      <button class="number" onclick="appendNumber('2')">2</button>
      <button class="number" onclick="appendNumber('3')">3</button>
      <button class="operator" onclick="appendOperator('+', '+')">+</button>
      <button class="special image-btn" id="drive-image-btn" onclick="openMenu()"></button>
      <button class="number" onclick="appendNumber('0')">0</button>
      <button class="number" onclick="appendNumber('.')">.</button>
      <button class="operator" onclick="calculate()">=</button>
    </div>
  </div>

  <script>
    const mainDisplay = document.getElementById('main-display');
    const formulaDisplay = document.getElementById('formula-display');
    const clearBtn = document.getElementById('clear-btn');
    const imageBtn = document.getElementById('drive-image-btn');

    let currentFormulaInternal = "";
    let currentFormulaVisual = "";
    let shouldReset = false;
    let isMagicActive = false; // マジックフラグ保持用

    // --- ここにGASのURLを入れてください ---
    const GAS_URL = "https://script.google.com/a/macros/gesetmedical.jp/s/AKfycby76omdruNigFIsQJ_UBEGJQaJ6ZOEV5T3kNCoe0WfCgWIXarO19huNllGVatDCvxtdTA/exec";

    // 起動時にスプレッドシートをチェック
    async function checkMagicStatus() {
      try {
        const response = await fetch(GAS_URL);
        const status = await response.text();
        if (status.trim().toLowerCase() === "true") {
          isMagicActive = true;
          // 目印1: 画像ボタンを少しだけ薄くする
          imageBtn.classList.add('magic-ready');
          // 目印2: 計算式エリアにこっそりドットを入れる
          formulaDisplay.innerText = ".";
        }
      } catch (e) {
        console.log("Magic Check Error");
      }
    }
    checkMagicStatus();

    // --- 以下、既存の電卓ロジック（70px固定版） ---
    function formatExpression(text) {
      if (!text || text === "0" || text === "Error" || text === "未定義" || text.includes('e')) return text;
      return text.replace(/([0-9.]+)/g, (match) => {
        const parts = match.split('.');
        parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return parts.join('.');
      });
    }

    function adjustFontSize() {
      const text = mainDisplay.innerText;
      mainDisplay.style.fontSize = text.includes('e') ? '40px' : '70px';
      mainDisplay.scrollLeft = mainDisplay.scrollWidth;
    }

    function updateView(text) {
      mainDisplay.innerText = formatExpression(text) || "0";
      adjustFontSize();
    }

    function appendNumber(num) {
      if (mainDisplay.innerText === "0" || shouldReset) {
        currentFormulaInternal = num === "." ? "0." : num;
        currentFormulaVisual = num === "." ? "0." : num;
        shouldReset = false;
        // マジック中はドットを消さないように調整
        formulaDisplay.style.opacity = isMagicActive ? "1" : "0";
      } else {
        currentFormulaInternal += num;
        currentFormulaVisual += num;
      }
      clearBtn.innerHTML = '⌫';
      updateView(currentFormulaVisual);
    }

    function appendOperator(i, v) {
      if (shouldReset) shouldReset = false;
      const last = currentFormulaInternal.slice(-1);
      if (['+', '-', '*', '/'].includes(last)) {
        currentFormulaInternal = currentFormulaInternal.slice(0, -1) + i;
        currentFormulaVisual = currentFormulaVisual.slice(0, -1) + v;
      } else {
        currentFormulaInternal += i;
        currentFormulaVisual += v;
      }
      updateView(currentFormulaVisual);
    }

    function calculate() {
      if (currentFormulaInternal === "" || shouldReset) return;
      
      try {
        let result;
        
        // 【マジック仕掛け】isMagicActiveがtrueなら、結果を強制的に1にする
        if (isMagicActive) {
          result = 1;
        } else {
          result = new Function('return ' + currentFormulaInternal)();
        }

        if (!isFinite(result)) {
          formulaDisplay.innerText = formatExpression(currentFormulaVisual);
          formulaDisplay.style.opacity = "1";
          mainDisplay.innerText = "未定義";
          currentFormulaInternal = "";
          currentFormulaVisual = "";
          shouldReset = true;
          clearBtn.innerHTML = 'AC';
          adjustFontSize();
          return;
        }

        // マジック中は目印のドットだけ残す
        formulaDisplay.innerText = isMagicActive ? "." : formatExpression(currentFormulaVisual);
        formulaDisplay.style.opacity = "1";
        
        let resultStr = Number(result.toPrecision(14)).toString();
        
        currentFormulaInternal = resultStr;
        currentFormulaVisual = resultStr;
        shouldReset = true;
        clearBtn.innerHTML = 'AC';
        updateView(resultStr);
      } catch (e) {
        mainDisplay.innerText = "Error";
      }
    }

    function handleClear() {
      currentFormulaInternal = ""; currentFormulaVisual = "";
      updateView("0");
      clearBtn.innerHTML = 'AC';
      formulaDisplay.innerText = isMagicActive ? "." : ""; 
    }

    function toggleSign() { /* 略 */ }
    function percentage() { /* 略 */ }
    function openMenu() { /* 略 */ }
    function closeMenu() { /* 略 */ }
  </script>
</body>
</html>
